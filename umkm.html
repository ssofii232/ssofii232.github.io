<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Es Jeruk Segarku - Segar & Alami</title>
    <style>
        :root {
            --primary-orange: #FF8C00;
            --green-fresh: #2E7D32;
            --bg-light: #FFF8E1;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg-light); text-align: center; }
        
        /* Hero Section */
        .hero { background: linear-gradient(135deg, #FFB347, #FFCC33); padding: 50px 20px; color: white; }
        .hero img { width: 150px; border-radius: 50%; border: 5px solid white; margin-bottom: 15px; }
        
        /* Menu Section */
        .menu-container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .menu-card { 
            background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .menu-info { text-align: left; }
        .price { font-weight: bold; color: var(--green-fresh); font-size: 1.2rem; }

        /* WA Button */
        .wa-btn {
            background: #25D366; color: white; padding: 18px 35px; border-radius: 50px;
            text-decoration: none; font-weight: bold; display: inline-block;
            margin-top: 30px; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>
<body>

    <section class="hero">
        <img src="IMG-20260311-WA0002.jpg" alt="Logo Es Jeruk Segarku">
        <h1>Es Jeruk Segarku</h1>
        <p>Dijamin Segar & Alami</p>
    </section>

    <div class="menu-container">
        <h2>Daftar Menu 🥤</h2>
        
        <div class="menu-card">
            <div class="menu-info">
                <h3>Es Jeruk Biasa</h3>
                <small>Segar dan murni</small>
            </div>
            <div class="price">10k</div>
        </div>

        <div class="menu-card">
            <div class="menu-info">
                <h3>Es Jeruk Susu</h3>
                <small>Creamy dan manis</small>
            </div>
            <div class="price">15k</div>
        </div>

        <div class="menu-card">
            <div class="menu-info">
                <h3>Es Jeruk Madu</h3>
                <small>Manis alami & sehat</small>
            </div>
            <div class="price">15k</div>
        </div>

        <a href="https://wa.me/6283862224389?text=halo%20saya%20mau%20pesen%20es%20jeruk" class="wa-btn">
            🟢 Pesan via WhatsApp
        </a>
    </div>

    <footer style="padding: 20px; color: #888;">
        &copy; 2026 Es Jeruk Segarku
    </footer>

</body>
</html>
